name: Deploy Infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform Infrastructure Deployment
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Terraform on the GitHub runner
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      # Configure AWS using OIDC (secure authentication)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::808850079759:role/github-actions-terraform-role
          aws-region: us-east-1

      # Terraform Format Check (best practice)
      - name: Terraform Format
        run: terraform fmt -check
        working-directory: terraform/environment/dev

      # Initialize Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environment/dev

      # Terraform Plan
      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/environment/dev

      # Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/environment/dev